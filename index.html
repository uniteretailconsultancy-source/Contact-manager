<!DOCTYPE html>
<html>
<head>
  <title>Contact Manager Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>

.logo-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 10px;
}

.logo-container img {
  max-width: 200px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dbe6f6);
      margin: 0;
      padding: 15px;
    }

    h2 { text-align: center; }

    .container { max-width: 420px; margin: auto; }

    .form-box {
      background: #fff;
      padding: 18px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .add-btn { background: #28a745; color: white; }
    .cancel-btn { background: #dc3545; color: white; }
    .export-btn { background: #2776ea; color: white; }

    .search-box {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    ul { padding: 0; }

    li {
      list-style: none;
      background: #fff;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .contact-info { flex: 1; }

    .action-btns {
      display: flex;
      gap: 5px;
    }

    .edit-btn {
      background: #ffc107;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-btn {
      width: 80px;
      height: 35px;
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #suggestions {
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  max-height: 150px;
  overflow-y: auto;
  position: relative;
}

#citySuggestions {
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  max-height: 150px;
  overflow-y: auto;
  position: relative;
  margin-top: 5px;
}

.suggestion-item {
  padding: 8px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #f1f1f1;
}
  </style>
</head>

<body>

<div class="container">

  <div class="form-box">
    <div class="logo-container">
  <img src="logo.png" alt="Contact Manager Pro Logo">
</div>
    <input id="name" placeholder="Name" oninput="this.value=this.value.toUpperCase()">
    <input id="company" placeholder="Company"
oninput="this.value=this.value.toUpperCase(); showSuggestions()"
onkeydown="handleSuggestionKey(event)">
<div id="suggestions"></div>
    <input id="position" placeholder="Position" oninput="this.value=this.value.toUpperCase()">
    <input id="city" placeholder="City"
oninput="this.value=this.value.toUpperCase(); showCitySuggestions()"
onkeydown="handleCityKey(event)">
<div id="citySuggestions"></div>
<input id="phone1" placeholder="Primary Phone" maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input id="phone2" placeholder="Secondary Phone" maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <div class="btn-group">
      <button class="cancel-btn" onclick="clearForm()">Clear (F3)</button>
      <button class="add-btn" onclick="addContact()">Add (F4)</button>
      <button class="export-btn" onclick="exportToExcel()">Export (F9)</button>
    </div>
  </div>

  <div class="search-box">
    <input id="search" placeholder="🔍 Search anything..." oninput="renderContacts()">
    <select id="filterCompany" onchange="renderContacts()">
      <option value="">All Companies</option>
    </select>
  </div>

  <ul id="contactList"></ul>

</div>

<script>
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
let editIndex = -1;

function updateFilterOptions() {
  const select = document.getElementById("filterCompany");
  const companies = [...new Set(contacts.map(c => c.company))];

  select.innerHTML = `<option value="">All Companies</option>`;
  companies.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

function renderContacts() {
  const list = document.getElementById("contactList");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filterCompany").value;

  list.innerHTML = "";

  const filtered = contacts.filter(c => {
    return (
      (c.name.toLowerCase().includes(search) ||
       c.company.toLowerCase().includes(search) ||
       c.position.toLowerCase().includes(search) ||
       c.city.toLowerCase().includes(search) ||
       c.phone1.includes(search) ||
       (c.phone2 || "").includes(search)) &&
      (filter ? c.company === filter : true)
    );
  });

  filtered.forEach((c, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div class="contact-info">
        <b>${c.name}</b><br>
        ${c.company} - ${c.position}<br>
        ${c.city}<br>
        📞 ${c.phone1} ${c.phone2 ? "| " + c.phone2 : ""}
      </div>

      <div class="action-btns">
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
    `;

    li.querySelector(".edit-btn").onclick = () => editContact(index);
    li.querySelector(".delete-btn").onclick = () => deleteContact(index);

    list.appendChild(li);
  });
}

function addContact() {
  const c = {
    name: document.getElementById("name").value.trim(),
    company: document.getElementById("company").value.trim(),
    position: document.getElementById("position").value.trim(),
    city: document.getElementById("city").value.trim(),
    phone1: document.getElementById("phone1").value.trim(),
    phone2: document.getElementById("phone2").value.trim()
  };

if (!c.name || !c.company || !c.position || !c.city || !c.phone1) {
  alert("Fill required fields!");
  return;
}

if (!isValidMobile(c.phone1)) {
  alert("Enter valid Primary Mobile Number!");
  return;
}

if (c.phone2 && !isValidMobile(c.phone2)) {
  alert("Enter valid Secondary Mobile Number!");
  return;
}

  if (editIndex === -1) {
    contacts.push(c);
  } else {
    contacts[editIndex] = c;
    editIndex = -1;
    document.querySelector(".add-btn").innerText = "Add (F4)";
  }

  localStorage.setItem("contacts", JSON.stringify(contacts));
  clearForm();
  updateFilterOptions();
  renderContacts();
}

function editContact(index) {
  const c = contacts[index];

  document.getElementById("name").value = c.name;
  document.getElementById("company").value = c.company;
  document.getElementById("position").value = c.position;
  document.getElementById("city").value = c.city;
  document.getElementById("phone1").value = c.phone1;
  document.getElementById("phone2").value = c.phone2;

  editIndex = index;
  document.querySelector(".add-btn").innerText = "Update (F4)";
}

function deleteContact(index) {
  if (confirm("Delete this contact?")) {
    contacts.splice(index, 1);
    localStorage.setItem("contacts", JSON.stringify(contacts));
    updateFilterOptions();
    renderContacts();
  }
}

function clearForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  editIndex = -1;
  document.querySelector(".add-btn").innerText = "Add (F4)";
}

// Shortcuts
document.addEventListener("keydown", e => {
  if (e.key === "F3") { e.preventDefault(); clearForm(); }
  if (e.key === "F4") { e.preventDefault(); addContact(); }
  if (e.key === "F9") { e.preventDefault(); exportToExcel(); }
});

// Export with date
function exportToExcel() {
  if (!contacts.length) return alert("No data!");

  const today = new Date();
  const fileName = `CONTACT_LIST_${today.getDate()}${today.getMonth()+1}${today.getFullYear()}.xlsx`;

  // Convert keys to uppercase
  const data = contacts.map(c => ({
    NAME: c.name,
    COMPANY: c.company,
    POSITION: c.position,
    CITY: c.city,
    PHONE1: c.phone1,
    PHONE2: c.phone2
  }));

  const ws = XLSX.utils.json_to_sheet(data);

  // Auto column width
  const colWidths = Object.keys(data[0]).map(key => {
    const maxLength = Math.max(
      key.length,
      ...data.map(row => (row[key] ? row[key].toString().length : 0))
    );
    return { wch: maxLength + 2 };
  });

  ws["!cols"] = colWidths;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "CONTACTS");

  const buffer = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([buffer]);

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
}

function autoFillCompanyDetails() {
  const companyInput = document.getElementById("company");
  const cityInput = document.getElementById("city");

  const companyValue = companyInput.value.trim().toUpperCase();

  if (!companyValue) return;

  // Find existing company
  const found = contacts.find(c => c.company === companyValue);

  if (found) {
    cityInput.value = found.city;
  }
}

function showSuggestions() {
  const input = document.getElementById("company").value;
  const box = document.getElementById("suggestions");

  if (!input) {
    box.innerHTML = "";
    return;
  }

  const matches = [...new Set(contacts.map(c => c.company))]
    .filter(c => c.includes(input));

  box.innerHTML = "";

  matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = m;

    div.onclick = () => selectSuggestion(m);

    box.appendChild(div);
  });
}

function selectSuggestion(companyName) {
  document.getElementById("company").value = companyName;
  document.getElementById("suggestions").innerHTML = "";
}

// Keyboard support (Enter key)
function handleSuggestionKey(e) {
  if (e.key === "Enter") {
    const first = document.querySelector(".suggestion-item");
    if (first) {
      selectSuggestion(first.innerText);
      e.preventDefault();
    }
  }
}

function showCitySuggestions() {
  const input = document.getElementById("city").value;
  const box = document.getElementById("citySuggestions");

  if (!input) {
    box.innerHTML = "";
    return;
  }

  const matches = [...new Set(contacts.map(c => c.city))]
    .filter(c => c.includes(input));

  box.innerHTML = "";

  matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = m;

    div.onclick = () => selectCity(m);

    box.appendChild(div);
  });
}

function selectCity(cityName) {
  document.getElementById("city").value = cityName;
  document.getElementById("citySuggestions").innerHTML = "";
}

// Keyboard Enter support
function handleCityKey(e) {
  if (e.key === "Enter") {
    const first = document.querySelector("#citySuggestions .suggestion-item");
    if (first) {
      selectCity(first.innerText);
      e.preventDefault();
    }
  }
}

const fields = ["name", "company", "position", "city", "phone1", "phone2"];

fields.forEach((id, index) => {
  document.getElementById(id).addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();

      if (index < fields.length - 1) {
        document.getElementById(fields[index + 1]).focus();
      } else {
        addContact(); // last field → submit
      }
    }
  });
});

function isValidMobile(number) {
  return /^[6-9]\d{9}$/.test(number);
}

updateFilterOptions();
renderContacts();
</script>

</body>
</html>
